<!DOCTYPE html>
<html>
	<head>
		<title>Product</title>

		<!-- This code is needed for responsive design to work.
		(Responsive design = make the website look good on
		smaller screen sizes like a phone or a tablet). -->
		<meta name="viewport" content="width=device-width, initial-scale=1">

		<!-- Load a font called Roboto from Google Fonts. -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

		<!-- Here are the CSS files for this page. -->
		<link rel="stylesheet" href="styles/shared/general.css">
		<link rel="stylesheet" href="styles/shared/amazon-header.css">
		<link rel="stylesheet" href="styles/pages/product-page.css">
  	</head>
  	<body>
		<div class="amazon-header js-header">
		</div>

		<div class="main js-main">
			<div class="product-page">
				<div class="product-page-image-container">
					<img class="product-page-image" src="" alt="">
				</div>
				<div class="product-page-details">
					<h1 class="product-page-title"></h1>
					<div class="product-page-rating">
						<img class="product-page-stars" src="" alt="">
						<span class="product-page-rating-count"></span>
					</div>
					<div class="product-page-price"></div>
					<div class="product-page-quantity">
						<label for="product-quantity">Quantity:</label>
						<select id="product-quantity" class="product-page-quantity-select">
							<option value="1">1</option>
							<option value="2">2</option>
							<option value="3">3</option>
							<option value="4">4</option>
							<option value="5">5</option>
							<option value="6">6</option>
							<option value="7">7</option>
							<option value="8">8</option>
							<option value="9">9</option>
							<option value="10">10</option>
						</select>
					</div>
					<button class="product-page-add-to-cart button-primary">Add to Cart</button>
					<div class="product-page-description">
						<h2>Description</h2>
						<p></p>
					</div>
				</div>
			</div>
		</div>

		<script src="./scripts/product/productPage.js" type="module"></script>
  	</body>
</html>
